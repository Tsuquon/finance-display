name: Stock alerts

# Headless alert checker. Runs in GitHub's cloud on a schedule, evaluates every
# active alert directly against Neon + Yahoo, and pushes/emails any that fire.
# The dashboard never needs to be hosted anywhere — only this cron does.

on:
  schedule:
    # Every 30 minutes. Cron is UTC; GitHub may delay runs under load.
    - cron: "*/30 * * * *"
  workflow_dispatch: {} # lets you trigger a run by hand from the Actions tab

# Don't pile up overlapping runs if one is slow.
concurrency:
  group: stock-alerts
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # yahoo-finance2 v3 requires Node >= 22
          cache: "npm"

      - run: npm ci

      - name: Evaluate alerts
        run: npm run alerts:check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEMO_MODE: "true" # force live data (CI NODE_ENV is not production)
          # Finnhub serves US-ticker quotes/fundamentals; Yahoo covers ASX + fallback.
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          # Shared fallback; the per-function keys below override it where set.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # This worker spends tokens on two AI paths: alert worthiness filtering
          # (lib/alerts) and stale-score refresh (lib/scoring). Give each its own
          # key so usage is billed/limited separately; both fall back to the
          # shared key above when the secret is unset.
          ANTHROPIC_API_KEY_ALERTS: ${{ secrets.ANTHROPIC_API_KEY_ALERTS }}
          ANTHROPIC_API_KEY_SCORING: ${{ secrets.ANTHROPIC_API_KEY_SCORING }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional email fallback — leave unset to use Telegram only.
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
